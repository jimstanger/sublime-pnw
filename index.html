<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sound Bath — Singing Bowls Drone Generator</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <canvas id="visualizer"></canvas>

  <div id="app">
    <header>
      <h1>Sound Bath</h1>
      <p class="subtitle">Singing Bowls Drone Generator</p>
    </header>

    <div id="controls">
      <div id="master-controls">
        <button id="power-btn" class="control-btn" aria-label="Play/Pause">
          <svg id="play-icon" viewBox="0 0 24 24" width="28" height="28">
            <polygon points="6,3 20,12 6,21" fill="currentColor"/>
          </svg>
          <svg id="pause-icon" viewBox="0 0 24 24" width="28" height="28" style="display:none">
            <rect x="5" y="3" width="4" height="18" fill="currentColor"/>
            <rect x="15" y="3" width="4" height="18" fill="currentColor"/>
          </svg>
        </button>
        <div id="master-volume">
          <label for="master-vol">Volume</label>
          <input type="range" id="master-vol" min="0" max="100" value="70" orient="horizontal">
        </div>
      </div>

      <div id="sliders-container">
        <!-- Sliders are generated by JS -->
      </div>

      <div id="presets">
        <h2>Presets</h2>
        <div id="preset-buttons">
          <button class="preset-btn active" data-preset="default">Default</button>
          <button class="preset-btn" data-preset="deep">Deep</button>
          <button class="preset-btn" data-preset="bright">Bright</button>
          <button class="preset-btn" data-preset="hollow">Hollow</button>
          <button class="preset-btn" data-preset="celestial">Celestial</button>
          <button class="preset-btn" data-preset="meditation">Meditation</button>
          <button class="preset-btn" data-preset="chakra">Chakra</button>
          <button class="preset-btn" data-preset="rain">Rain</button>
          <button class="preset-btn" data-preset="random">Random</button>
        </div>
      </div>

      <div id="animation-controls">
        <h2>Animation</h2>
        <div id="animation-buttons">
          <button class="anim-btn" data-anim="off">Off</button>
          <button class="anim-btn active" data-anim="slow">Slow</button>
          <button class="anim-btn" data-anim="medium">Medium</button>
          <button class="anim-btn" data-anim="fast">Fast</button>
        </div>
      </div>
    </div>

    <footer>
      <p>Use headphones for the best experience. Click play to begin.</p>
    </footer>
  </div>

  <script src="js/audio-engine.js"></script>
  <script src="js/visualizer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
